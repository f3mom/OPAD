- name: Install OPAD defense agent on authorized vulnbox
  hosts: vulnboxes
  become: true
  vars:
    opad_agent_workdir: /opt/opad-agent
  tasks:
  - name: Create agent directory
    ansible.builtin.file:
      path: '{{ opad_agent_workdir }}'
      state: directory
      mode: '0750'
  - name: Install Python packages
    ansible.builtin.package:
      name:
      - python3
      - python3-venv
      - docker.io
      state: present
  - name: Copy agent config template
    ansible.builtin.template:
      src: opad-agent.yml.j2
      dest: '{{ opad_agent_workdir }}/opad-agent.yml'
      mode: '0600'
  - name: Install systemd unit
    ansible.builtin.template:
      src: opad-agent.service.j2
      dest: /etc/systemd/system/opad-agent.service
  - name: Enable agent
    ansible.builtin.systemd:
      name: opad-agent
      enabled: true
      state: started
      daemon_reload: true
