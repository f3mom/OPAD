apiVersion: v1
kind: Namespace
metadata:
  name: opad
---
apiVersion: v1
kind: Secret
metadata:
  name: opad-secrets
  namespace: opad
type: Opaque
stringData:
  OPAD_SECRET_KEY: change-me
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opad
  namespace: opad
spec:
  replicas: 1
  selector:
    matchLabels:
      app: opad
  template:
    metadata:
      labels:
        app: opad
    spec:
      containers:
      - name: opad
        image: ${OPAD_IMAGE}
        ports:
        - containerPort: 1337
        envFrom:
        - secretRef:
            name: opad-secrets
        volumeMounts:
        - mountPath: /data
          name: data
      volumes:
      - name: data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: opad
  namespace: opad
spec:
  selector:
    app: opad
  ports:
  - port: 1337
    targetPort: 1337
  type: ClusterIP
