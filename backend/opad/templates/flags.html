{% extends "base.html" %}{% block content %}
<h1>Flags</h1><div class="card"><h2>Manual extract/store</h2><input id="manual_flag" placeholder="Paste flag or text"><button onclick="storeFlag()">Extract and store</button><pre id="manual_flag_result"></pre></div><div class="card"><h2>Stored flags</h2><table><tr><th>ID</th><th>Flag</th><th>Source</th><th>Service</th><th>Status</th><th>Verdict</th></tr>{% for f in flags %}<tr><td>{{ f.id }}</td><td>{{ f.value_redacted }}</td><td>{{ f.source_type }}</td><td>{{ f.service_name }}</td><td>{{ f.submit_status }}</td><td>{{ f.submit_verdict }}</td></tr>{% endfor %}</table></div>
{% endblock %}
